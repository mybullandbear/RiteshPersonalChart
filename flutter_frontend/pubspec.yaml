name: nse_flutter_app
description: NSE Option Chain Pro Dashboard
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  intl: ^0.19.0
  fl_chart: 0.66.2

dependency_overrides:
  # objective_c 4.x has no build hooks - avoids the Windows spaces-in-path bug
  objective_c: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
