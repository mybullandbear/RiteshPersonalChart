version: '3.8'

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./option_chain.db:/app/option_chain.db
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Kolkata

  fetcher:
    build: .
    command: python fetch_nse_data.py
    volumes:
      - ./data:/app/data
      - ./option_chain.db:/app/option_chain.db
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Kolkata
    depends_on:
      - backend

  frontend:
    build:
      context: ./flutter_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
